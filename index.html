<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>roppy</title>
  <style>
    /* ===== 🎨 テーマ共通・ライトモードの基本色 ===== */
    :root {
      --bg-color: #fdfdfd;
      --text-color: #333333;
      --card-bg: white;
      --banner-bg: #eeeeee;
      --banner-text: #555555;
      --choice-bg: white;
      --choice-text: #333333;
    }

    /* ===== 🌙 ダークモード用の色 ===== */
    [data-theme="dark"] {
      --bg-color: #121212;
      --text-color: #e0e0e0;
      --card-bg: #1e1e1e;
      --banner-bg: #2d2d2d;
      --banner-text: #bbbbbb;
      --choice-bg: #2d2d2d;
      --choice-text: #e0e0e0;
    }

    body { text-align:center; font-family:sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; transition: background 0.3s, color 0.3s; }
    h1 { font-size:35px; margin-top: 20px; margin-bottom: 5px; }

    /* ===== 💬 応援メッセージボード ===== */
    .cheer-box {
      max-width: 450px; margin: 15px auto; padding: 12px 20px; background: linear-gradient(135deg, #fff5cc 0%, #fffbfa 100%); border-left: 5px solid #ff9800; border-radius: 4px 12px 12px 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); font-weight: bold; color: #e65100; font-size: 16px; line-height: 1.4;
    }
    [data-theme="dark"] .cheer-box {
      background: linear-gradient(135deg, #2d2200 0%, #221a1a 100%); border-left: 5px solid #ff9800; color: #ffd54f; box-shadow: none;
    }

    /* ===== キャンバス（エフェクト用） ===== */
    #confettiCanvas {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none; z-index: 9999;
    }

    /* ===== ボタン全般 ===== */
    button {
      font-size:20px; padding:12px; margin:8px; width:260px; border-radius:12px; border:none; color:white; font-weight:bold; cursor:pointer; transition: all 0.08s ease; box-shadow: 0 5px 0 rgba(0,0,0,0.15);
    }
    button:hover { filter: brightness(1.15); box-shadow: 0 6px 12px rgba(0,0,0,0.2); }
    button:active { transform: translateY(4px) scale(0.96); box-shadow: 0 1px 0 rgba(0,0,0,0.3) inset; }

    /* 色 */
    .red { background:#ff4d4d; }
    .blue { background:#4da6ff; }
    .green { background:#4CAF50; }
    .orange { background:#ff9800; }
    .black { background:#333; }
    [data-theme="dark"] .black { background: #444; }

    /* 上部固定ヘッダーエリア（戻るボタン用） */
    .header-bar {
      width: 100%; padding: 10px 0; background: rgba(0,0,0,0.03); border-bottom: 1px solid rgba(0,0,0,0.05); text-align: center; margin-bottom: 15px;
    }
    [data-theme="dark"] .header-bar {
      background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .back-top-btn { width: 180px; padding: 8px; font-size: 16px; margin: 0; }

    /* 選択肢エリア */
    #choices, #r_choices { max-width: 600px; margin: 0 auto; padding-bottom: 10px; }
    .choice { background: var(--choice-bg); color: var(--choice-text); border:2px solid #4da6ff; box-shadow: 0 4px 0 rgba(77,166,255,0.2); position: relative; }
    .choice:hover { background:#4da6ff; color:white; }
    
    /* 正解・不正解の選択肢カラー */
    .choice.correct-choice { background:#4CAF50 !important; color:white !important; border-color:#4CAF50 !important; box-shadow: none; }
    .choice.wrong-choice { background:#ff4d4d !important; color:white !important; border-color:#ff4d4d !important; box-shadow: none; }
    
    /* 次へボタン */
    .next-btn { background:#ff4d4d; color:white; font-size:22px; padding:12px 50px; border-radius:12px; width:auto; box-shadow: 0 6px 0 #c0392b; }
    .next-container { text-align:center; height: 75px; margin-top: 5px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; }
    .mode-title { background:green; color:white; padding:10px; font-size:25px; font-weight: bold; }
    
    /* 正解・不正解テキストの表示エリア */
    .result-text-box { font-size: 24px; font-weight: bold; min-height: 40px; margin-top: 15px; }
    
    /* 通常コンボカウンターエリア */
    .combo-container-box { height: 40px; margin: 5px 0; position: relative; overflow: visible; display: flex; justify-content: center; align-items: center; }
    .flash-combo {
      position: absolute; font-size: 28px; font-weight: 900; color: #ff9800; font-style: italic; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); opacity: 0; pointer-events: none;
    }
    @keyframes comboFlashAnim {
      0% { transform: scale(0.5) translateY(10px); opacity: 0; }
      15% { transform: scale(1.2) translateY(0px); opacity: 1; }
      30% { transform: scale(1.0) translateY(0px); opacity: 1; }
      80% { transform: scale(1.0) translateY(-10px); opacity: 1; }
      100% { transform: scale(0.8) translateY(-25px); opacity: 0; }
    }

    /* 大台コンボポップアップ */
    .combo-popup { 
      position: fixed; top: 35%; left: 50%; transform: translate(-50%, -50%) scale(0); 
      font-size: 52px; font-weight: 900; z-index: 10000; pointer-events: none; 
      text-shadow: 3px 3px 0 #fff, -3px -3px 0 #fff, 3px -3px 0 #fff, -3px 3px 0 #fff, 0 5px 20px rgba(0,0,0,0.4); 
      font-style: italic; 
    }
    @keyframes comboAnim {
      0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
      12% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
      25% { transform: translate(-50%, -50%) scale(1.0); opacity: 1; }
      80% { transform: translate(-50%, -50%) scale(1.0); opacity: 1; }
      100% { transform: translate(-50%, -55%) scale(0.7); opacity: 0; }
    }

    /* スライドショー */
    .slide-container { margin: 30px auto; min-height: 180px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .slide-english { font-size: 45px; font-weight: bold; color: var(--text-color); margin-bottom: 15px; }
    .slide-meaning { font-size: 28px; color: #666; }
    [data-theme="dark"] .slide-meaning { color: #aaa; }
    
    .icon-btn { width:50px; font-size:16px; padding:5px; margin-left:10px; color: white; background: #555; vertical-align: middle; box-shadow: none; }
    
    /* トグルスイッチ */
    .settings-item { display: flex; justify-content: space-between; align-items: center; max-width: 320px; margin: 10px auto; padding: 5px 10px; }
    .settings-item p { margin: 0; font-size: 18px; font-weight: bold; }
    .switch { display:inline-block; width:60px; height:30px; background:#ccc; border-radius:30px; position:relative; cursor:pointer;}
    .switch::after { content:""; width:26px; height:26px; background:white; position:absolute; top:2px; left:2px; border-radius:50%; transition:0.3s;}
    .switch.active { background:#4CAF50; }
    .switch.active::after { left:32px; }

    /* 単語帳 */
    .card-container { margin: 30px auto; min-height: 180px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .card-english { font-size: 45px; font-weight: bold; color: var(--text-color); margin-bottom: 15px; }
    .card-meaning { font-size: 28px; color: #666; }
    [data-theme="dark"] .card-meaning { color: #aaa; }
    .card-ctrl-btn { width: 120px; margin: 10px; background: #555; }
    .card-ctrl-btn:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; transform: none; }

    /* スコア表示 */
    .score-banner { font-size: 16px; font-weight: bold; color: var(--banner-text); margin: 10px auto; background: var(--banner-bg); padding: 6px 15px; border-radius: 20px; display: inline-block; }

    /* ===== 🏆 特設リザルト画面 ===== */
    .result-screen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; animation: fadeIn 0.4s ease forwards;
    }
    @keyframes fadeIn { from { opacity: 0; transform: scale(1.05); } to { opacity: 1; transform: scale(1); } }
    
    .result-screen.pass-bg { background: linear-gradient(135deg, #ffe066 0%, #f5af19 100%); color: #333; }
    .result-screen.fail-bg { background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%); color: white; }
    .result-screen.return-clear-bg { background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%); color: white; }
    .result-title { font-size: 60px; font-weight: 900; text-shadow: 0 4px 10px rgba(0,0,0,0.2); margin-bottom: 10px; }
    .result-sub { font-size: 24px; font-weight: bold; margin-bottom: 30px; opacity: 0.9; }
    .result-score { font-size: 45px; font-weight: bold; background: rgba(255,255,255,0.25); padding: 15px 40px; border-radius: 50px; margin-bottom: 40px; backdrop-filter: blur(5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .fail-bg .result-score { background: rgba(0,0,0,0.3); }
    .result-btn-group button { width: 220px; margin: 10px; font-size: 22px; padding: 15px; }

    /* 空画面 */
    .empty-state-container { margin: 40px auto; padding: 30px; max-width: 500px; background: var(--card-bg); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .empty-emoji { font-size: 80px; margin-bottom: 20px; }
    .empty-text { font-size: 22px; font-weight: bold; color: var(--text-color); line-height: 1.6; margin-bottom: 30px; }
  </style>
</head>
<body>

  <canvas id="confettiCanvas"></canvas>
  <div id="comboPopup" class="combo-popup"></div>

  <!-- ホーム画面 -->
  <div id="home" style="padding: 20px;">
    <h1>単語暗記アプリ roppy</h1>
    
    <!-- 💬 応援メッセージ表示エリア -->
    <div id="cheerMessage" class="cheer-box"></div>

    <button class="red" onclick="showStudyMenu()">📖 暗記モード</button><br>
    <button class="blue" onclick="showTestMenu()">📝 テスト</button><br>
    <button class="green" onclick="goReturn()">🔁 リターン学習</button><br>
    <button class="black" onclick="openSettings()">⚙ 設定</button><br>
    <div id="scoreDisplay" class="score-banner"></div><br>
    <button class="orange" onclick="resetDataPrompt()">🗑 リセット</button>
  </div>

  <!-- 暗記モード子メニュー -->
  <div id="studyMenu" style="display:none;">
    <div class="header-bar"><button onclick="goHome()" class="black back-top-btn">← ホームへ戻る</button></div>
    <h2>暗記モードを選択</h2>
    <button class="red" onclick="showSlideMenu()">▶ スライドショー</button><br>
    <button class="orange" onclick="showCardMenu()">📑 単語帳</button>
  </div>

  <!-- 設定画面 -->
  <div id="settings" style="display:none;">
    <div class="header-bar"><button onclick="goHome()" class="black back-top-btn">← ホームへ戻る</button></div>
    <h2>設定</h2>
    <div class="settings-item"><p>ダークモード</p><div id="darkSwitch" class="switch" onclick="toggleDarkMode()"></div></div>
    <div class="settings-item"><p>単語読み上げ</p><div id="soundSwitch" class="switch" onclick="toggleSound()"></div></div>
    <div class="settings-item"><p>効果音(SE)</p><div id="seSwitch" class="switch" onclick="toggleSE()"></div></div>
    <div class="settings-item"><p>BGM(音楽)</p><div id="bgmSwitch" class="switch" onclick="toggleBGM()"></div></div>
    <div class="settings-item"><p>演出エフェクト</p><div id="effectSwitch" class="switch" onclick="toggleEffect()"></div></div>
    
    <p>合格レベル</p>
    <div>
      <button class="green" onclick="setPass(60)">かんたん（60%）</button><br>
      <button class="blue" onclick="setPass(80)">ふつう（80%）</button><br>
      <button class="orange" onclick="setPass(90)">むずかしい（90%）</button><br>
      <button class="red" onclick="setPass(100)">鬼（100%）</button>
    </div>
    <p id="passDisplay"></p>
  </div>

  <!-- スライドショー範囲選択 -->
  <div id="slideMenu" style="display:none;">
    <div class="header-bar"><button onclick="backToStudyMenu()" class="black back-top-btn">← 戻る</button></div>
    <h2>スライドショー範囲を選択</h2>
    <div id="slideRangeButtons"></div>
  </div>

  <!-- スライドショー実行画面 -->
  <div id="slide" style="display:none;">
    <div class="header-bar"><button onclick="backToSlideMenu()" class="black back-top-btn">← 範囲選択に戻る</button></div>
    <div class="mode-title">スライドショーモード</div>
    <div id="progress" style="margin-top:20px; font-weight: bold;"></div>
    <div class="slide-container">
      <div id="slideEnglish" class="slide-english"></div>
      <div id="slideMeaning" class="slide-meaning"></div>
    </div>
    <button id="startBtn" class="red" onclick="startSlide()">▶ スタート！</button>
    <button id="resumeBtn" class="blue" style="display:none;" onclick="resumeSlide()">▶ 再開</button>
    <button id="stopBtn" class="orange" style="display:none;" onclick="stopSlide()">⏸ ストップ</button>
    <button id="restartBtn" class="green" style="display:none;" onclick="restartSlide()">🔄 もう一度</button>
  </div>

  <!-- 単語帳範囲選択 -->
  <div id="cardMenu" style="display:none;">
    <div class="header-bar"><button onclick="backToStudyMenu()" class="black back-top-btn">← 戻る</button></div>
    <h2>単語帳範囲を選択</h2>
    <div id="cardRangeButtons"></div>
  </div>

  <!-- 単語帳実行画面 -->
  <div id="cardView" style="display:none;">
    <div class="header-bar"><button onclick="backToCardMenu()" class="black back-top-btn">← 範囲選択に戻る</button></div>
    <div class="mode-title">単語帳モード</div>
    <div id="cardProgress" style="margin-top:20px; font-weight: bold;"></div>
    <div class="card-container">
      <div id="cardEnglish" class="card-english"></div>
      <div id="cardMeaning" class="card-meaning"></div>
    </div>
    <div>
      <button id="cardPrevBtn" class="card-ctrl-btn" onclick="prevCard()">← 戻る</button>
      <button id="cardNextBtn" class="card-ctrl-btn" onclick="nextCard()">次へ →</button>
    </div>
  </div>

  <!-- テスト範囲選択 -->
  <div id="testMenu" style="display:none;">
    <div class="header-bar"><button onclick="goHome()" class="black back-top-btn">← ホームへ戻る</button></div>
    <h2>テスト範囲を選択</h2>
    <div id="rangeButtons"></div>
  </div>

  <!-- テスト実行画面 -->
  <div id="test" style="display:none; padding: 0 10px;">
    <div class="header-bar"><button onclick="backToTestMenu()" class="black back-top-btn">← 範囲選択に戻る</button></div>
    <div class="mode-title">テストモード</div>
    <div id="lastScoreDisplay" style="font-size:15px; font-weight: bold; color: #555; background:#eee; padding:5px 15px; border-radius:15px; display:inline-block; margin-top:15px;"></div>
    <div id="t_progress" style="margin-top:15px; font-weight: bold; font-size: 18px;"></div>
    
    <div class="combo-container-box"><div id="t_combo" class="flash-combo"></div></div>
    
    <h2 id="question" style="font-size: 38px; margin-top: 5px;"></h2>
    <div id="choices"></div>
    
    <!-- ⭕❌および正解表示エリア -->
    <div id="result" class="result-text-box"></div>
    
    <div class="next-container">
      <button id="nextBtn" class="next-btn" style="display:none;" onclick="nextQ()">次へ →</button>
    </div>
  </div>

  <!-- リターン学習（問題あり） -->
  <div id="return" style="display:none; padding: 0 10px;">
    <div class="header-bar"><button onclick="goHome()" class="black back-top-btn">← ホームへ戻る</button></div>
    <div class="mode-title">リターン学習</div>
    <div id="r_progress" style="margin-top:20px; font-weight: bold; font-size: 18px;"></div>
    
    <div class="combo-container-box"><div id="r_combo" class="flash-combo"></div></div>
    
    <h2 id="r_question" style="font-size: 38px; margin-top: 5px;"></h2>
    <div id="r_choices"></div>
    
    <!-- ⭕❌および正解表示エリア -->
    <div id="r_result" class="result-text-box"></div>
    
    <div class="next-container">
      <button id="r_nextBtn" class="next-btn" style="display:none;" onclick="nextR()">次へ →</button>
    </div>
  </div>

  <!-- リターン学習（空画面） -->
  <div id="returnEmpty" style="display:none; padding: 20px;">
    <div class="mode-title">リターン学習</div>
    <div class="empty-state-container">
      <div class="empty-emoji">✨🥳✨</div>
      <div class="empty-text">現在、間違えた問題はありません！<br>すべて完璧にマスターしています！</div>
      <button onclick="goHome()" class="green" style="width: 200px;">🏠 ホームへ戻る</button>
    </div>
  </div>

  <!-- 特設リザルト画面 -->
  <div id="resultScreen" class="result-screen" style="display: none;">
    <div id="resTitle" class="result-title"></div>
    <div id="resSub" class="result-sub"></div>
    <div id="resScore" class="result-score"></div>
    <div class="result-btn-group">
      <button id="retryBtn" class="red" style="display:none;">🔄 もう一度挑戦</button>
      <button id="closeResBtn" class="black" onclick="closeResultScreen()">🏠 戻る</button>
    </div>
  </div>

    function initAudio() {
      if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    }

    function playClickSE() {
      if (!seOn) return; initAudio();
      let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = "sine"; osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
      osc.start(); osc.stop(audioCtx.currentTime + 0.06);
    }

    function playCorrectSE(isBigCombo = false) {
      if (!seOn) return; initAudio();
      let now = audioCtx.currentTime;
      if (!isBigCombo) {
        [523.25, 659.25, 783.99].forEach((f, i) => {
          let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
          osc.connect(gain); gain.connect(audioCtx.destination);
          osc.type = "triangle"; osc.frequency.setValueAtTime(f, now + i * 0.04);
          gain.gain.setValueAtTime(0.1, now + i * 0.04);
          gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.04 + 0.3);
          osc.start(now + i * 0.04); osc.stop(now + i * 0.04 + 0.35);
        });
      } else {
        let notes = [523.25, 587.33, 659.25, 783.99, 1046.50];
        notes.forEach((f, i) => {
          let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
          osc.connect(gain); gain.connect(audioCtx.destination);
          osc.type = "sine"; osc.frequency.setValueAtTime(f, now + i * 0.07);
          let dur = i === notes.length - 1 ? 0.6 : 0.2;
          gain.gain.setValueAtTime(0.12, now + i * 0.07);
          gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.07 + dur);
          osc.start(now + i * 0.07); osc.stop(now + i * 0.07 + dur + 0.05);
        });
      }
    }

    function playWrongSE() {
      if (!seOn) return; initAudio();
      let now = audioCtx.currentTime;
      let osc1 = audioCtx.createOscillator(); let osc2 = audioCtx.createOscillator();
      let gain = audioCtx.createGain();
      osc1.connect(gain); osc2.connect(gain); gain.connect(audioCtx.destination);
      osc1.type = "sawtooth"; osc1.frequency.setValueAtTime(140, now);
      osc2.type = "sawtooth"; osc2.frequency.setValueAtTime(143, now); 
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.linearRampToValueAtTime(0.001, now + 0.3);
      osc1.start(); osc2.start();
      osc1.stop(now + 0.35); osc2.stop(now + 0.35);
    }

    function startBGM(mode) {
      if (!bgmOn) return; initAudio(); stopBGM();
      bgmStep = 0;
      let melody = []; let speed = 400;
      if (mode === "test") {
        melody = [329.63, 392.00, 440.00, 523.25, 392.00, 440.00, 493.88, 587.33, 440.00, 493.88, 523.25, 659.25, 392.00, 349.23, 329.63, 293.66];
        speed = 300;
      } else if (mode === "return") {
        melody = [220.00, 261.63, 329.63, 261.63, 293.66, 349.23, 440.00, 349.23, 261.63, 329.63, 392.00, 329.63, 196.00, 246.94, 293.66, 246.94];
        speed = 380;
      } else {
        melody = [261.63, 329.63, 392.00, 493.88, 349.23, 440.00, 523.25, 587.33];
        speed = 500;
      }
      bgmInterval = setInterval(() => {
        let now = audioCtx.currentTime;
        let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = "sine"; osc.frequency.setValueAtTime(melody[bgmStep % melody.length], now);
        gain.gain.setValueAtTime(0.018, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + (speed / 1000) * 0.9);
        osc.start(); osc.stop(now + (speed / 1000));
        bgmStep++;
      }, speed);
    }

    function stopBGM() {
      if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
    }

    const canvas = document.getElementById("confettiCanvas");
    const ctx = canvas.getContext("2d");
    let particles = []; let isConfettiMode = false; let animationFrameId = null;

    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener("resize", resizeCanvas); resizeCanvas();

    function triggerPopEffect(element) {
      if(!effectOn || !element) return;
      const rect = element.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2; const centerY = rect.top + rect.height / 2;
      const colors = ["#4CAF50", "#2196F3", "#ff9800", "#ff4d4d", "#e91e63", "#ffeb3b"];
      isConfettiMode = false; 
      for (let k = 0; k < 20; k++) {
        const angle = Math.random() * Math.PI * 2; const speed = Math.random() * 6 + 4; 
        particles.push({
          x: centerX, y: centerY, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          size: Math.random() * 5 + 5, color: colors[Math.floor(Math.random() * colors.length)],
          alpha: 1, decay: Math.random() * 0.03 + 0.03, type: Math.random() > 0.4 ? "star" : "circle"
        });
      }
      if (!animationFrameId) { updateParticles(); }
    }

    function triggerScreenBurst() {
      if(!effectOn) return;
      isConfettiMode = true; 
      const colors = ["#ffeb3b", "#ff4d4d", "#4da6ff", "#4CAF50", "#e91e63"];
      for (let k = 0; k < 120; k++) {
        particles.push({
          x: Math.random() * canvas.width, y: Math.random() * -canvas.height - 20,
          vx: Math.random() * 4 - 2, vy: Math.random() * 4 + 3, 
          size: Math.random() * 8 + 6, color: colors[Math.floor(Math.random() * colors.length)],
          rotation: Math.random() * 360, rotationSpeed: Math.random() * 6 - 3, alpha: 1
        });
      }
      if (!animationFrameId) { updateParticles(); }
    }

    function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius, color, alpha) {
      let rot = Math.PI / 2 * 3; let x = cx; let y = cy; let step = Math.PI / spikes;
      ctx.save(); ctx.globalAlpha = alpha; ctx.fillStyle = color; ctx.beginPath(); ctx.moveTo(cx, cy - outerRadius)
      for (let idx = 0; idx < spikes; idx++) {
        x = cx + Math.cos(rot) * outerRadius; y = cy + Math.sin(rot) * outerRadius; ctx.lineTo(x, y); rot += step;
        x = cx + Math.cos(rot) * innerRadius; y = cy + Math.sin(rot) * innerRadius; ctx.lineTo(x, y); rot += step;
      }
      ctx.lineTo(cx, cy - outerRadius); ctx.closePath(); ctx.fill(); ctx.restore();
    }

    function updateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (isConfettiMode) {
        let alive = false;
        particles.forEach(p => {
          p.y += p.vy; p.x += p.vx; p.rotation += p.rotationSpeed;
          if (p.y < canvas.height) { alive = true; }
          ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rotation * Math.PI / 180); ctx.fillStyle = p.color; ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size); ctx.restore();
        });
        if (alive) { animationFrameId = requestAnimationFrame(updateParticles); } 
        else { particles = []; animationFrameId = null; }
      } else {
        particles.forEach((p, index) => {
          p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.alpha -= p.decay;
          if (p.alpha <= 0) { particles.splice(index, 1); } 
          else {
            if (p.type === "star") { drawStar(ctx, p.x, p.y, 5, p.size, p.size / 2, p.color, p.alpha); } 
            else { ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
          }
        });
        if (particles.length > 0) { animationFrameId = requestAnimationFrame(updateParticles); } 
        else { animationFrameId = null; }
      }
    }

    function updateCombo(isCorrect) {
      const tCombo = document.getElementById("t_combo"); const rCombo = document.getElementById("r_combo");
      if(isCorrect) {
        comboCount++;
        if(comboCount > 0 && effectOn) {
          [tCombo, rCombo].forEach(el => {
            el.innerText = `🔥 ${comboCount} COMBO`; el.style.animation = "none"; el.offsetHeight; 
            el.style.animation = "comboFlashAnim 1.0s ease-out forwards";
          });
        }
        let bigComboText = ""; let comboColor = "#ff3d00"; let isBigMilestone = false;
        if(comboCount === 5) { bigComboText = "5 COMBO! Nice Move!"; comboColor = "#00b0ff"; isBigMilestone = true; }
        else if(comboCount === 10) { bigComboText = "10 COMBO! Great!"; comboColor = "#ffea00"; isBigMilestone = true; }
        else if(comboCount === 15) { bigComboText = "15 COMBO! Amazing!!"; comboColor = "#ff9100"; isBigMilestone = true; }
        else if(comboCount === 20) { bigComboText = "✨20 COMBO! PERFECT!!!✨"; comboColor = "#ff1744"; isBigMilestone = true; }
        playCorrectSE(isBigMilestone);
        if(bigComboText !== "" && effectOn) {
          const popup = document.getElementById("comboPopup");
          popup.innerText = bigComboText; popup.style.color = comboColor; popup.style.animation = "none"; popup.offsetHeight; 
          popup.style.animation = "comboAnim 1.4s ease forwards";
        }
      } else {
        comboCount = 0; playWrongSE(); tCombo.innerText = ""; rCombo.innerText = "";
        tCombo.style.animation = "none"; rCombo.style.animation = "none";
      }
    }

    function refreshCheerMessage() {
      const msgBox = document.getElementById("cheerMessage");
      msgBox.innerText = cheerMessages[Math.floor(Math.random() * cheerMessages.length)];
    }

    // ===== 設定UIコントロール =====
    function openSettings(){ hideAll(); document.getElementById("settings").style.display="block"; updateSettingsUI(); }
    function toggleDarkMode(){
      darkMode = !darkMode; localStorage.setItem("darkMode", darkMode);
      document.documentElement.setAttribute("data-theme", darkMode ? "dark" : "light");
      updateSettingsUI();
    }
    function toggleSound(){ soundOn=!soundOn; localStorage.setItem("soundOn", soundOn); updateSettingsUI(); }
    function toggleSE(){ seOn=!seOn; localStorage.setItem("seOn", seOn); updateSettingsUI(); }
    function toggleBGM(){
      bgmOn=!bgmOn; localStorage.setItem("bgmOn", bgmOn);
      if(bgmOn) { startBGM("test"); } else { stopBGM(); }
      updateSettingsUI();
    }
    function toggleEffect(){ effectOn=!effectOn; localStorage.setItem("effectOn", effectOn); updateSettingsUI(); }
    function setPass(val){
      let pw = prompt("パスワード:");
      if(pw==="sakura"){ passRate = val; localStorage.setItem("passRate", passRate); updateSettingsUI(); } else alert("パスワード違い");
    }
    function updateSettingsUI(){
      document.getElementById("darkSwitch").classList.toggle("active", darkMode);
      document.getElementById("soundSwitch").classList.toggle("active", soundOn);
      document.getElementById("seSwitch").classList.toggle("active", seOn);
      document.getElementById("bgmSwitch").classList.toggle("active", bgmOn);
      document.getElementById("effectSwitch").classList.toggle("active", effectOn);
      let t="";
      if(passRate==60) t="かんたん (60%)"; else if(passRate==80) t="ふつう (80%)"; else if(passRate==90) t="むずかしい (90%)"; else t="鬼100%";
      document.getElementById("passDisplay").innerText=t;
    }

    function showScore(){
      const disp=document.getElementById("scoreDisplay");
      let lastScore=localStorage.getItem("lastScore")||0; let lastTotal=localStorage.getItem("lastTotal")||0;
      disp.innerHTML = lastTotal > 0 ? `前回テスト(全体): ${lastScore} / ${lastTotal}` : "テストの履歴がありません";
    }

    // ===== 共通表示切り替え =====
    function hideAll(){
      home.style.display="none"; studyMenu.style.display="none"; cardMenu.style.display="none"; cardView.style.display="none"; slide.style.display="none"; test.style.display="none"; returnDiv.style.display="none"; returnEmpty.style.display="none"; resultScreen.style.display="none"; document.getElementById("testMenu").style.display="none"; document.getElementById("slideMenu").style.display="none"; document.getElementById("settings").style.display="none";
    }
    function goHome(){ comboCount = 0; stopSlide(); stopBGM(); hideAll(); home.style.display="block"; showScore(); refreshCheerMessage(); }
    function backToStudyMenu(){ stopSlide(); stopBGM(); hideAll(); studyMenu.style.display="block"; }
    function backToSlideMenu(){ stopSlide(); stopBGM(); hideAll(); document.getElementById("slideMenu").style.display="block"; }
    function backToCardMenu(){ hideAll(); cardMenu.style.display="block"; }
    function backToTestMenu(){ stopBGM(); hideAll(); showTestMenu(); }
    function showStudyMenu(){ hideAll(); studyMenu.style.display="block"; }

    // ===== スライドショー =====
    function showSlideMenu(){
      hideAll(); document.getElementById("slideMenu").style.display="block";
      let html="", size=20; 
      for(let i=0;i<words.length;i+=size){
        let start=i, end=Math.min(i+size,words.length);
        html+=`<button class="red" onclick="startSlideRange(${start},${end})">${start+1}-${end}</button><br>`;
      }
      document.getElementById("slideRangeButtons").innerHTML=html;
    }
    function startSlideRange(start,end){
      slideWords=words.slice(start,end); hideAll(); slide.style.display="block"; startBGM("slide"); i=0; 
      document.getElementById("slideEnglish").innerText=""; document.getElementById("slideMeaning").innerText=""; progress.innerText="";
      startBtn.style.display="inline-block"; resumeBtn.style.display="none"; stopBtn.style.display="none"; restartBtn.style.display="none";
    }
    function startSlide(){ startBtn.style.display="none"; resumeBtn.style.display="none"; stopBtn.style.display="inline-block"; restartBtn.style.display="none"; i=0; runSlide(); }
    function runSlide(){
      displayAndSpeakCurrentSlide(); i++;
      timer=setInterval(()=>{
        if(i>=slideWords.length){
          clearInterval(timer); document.getElementById("slideEnglish").innerText="終了！"; document.getElementById("slideMeaning").innerText="";
          stopBtn.style.display="none"; resumeBtn.style.display="none"; restartBtn.style.display="inline-block"; return;
        }
        displayAndSpeakCurrentSlide(); i++;
      }, SLIDE_SPEED_MS);
    }
    function displayAndSpeakCurrentSlide(){
      let w=slideWords[i]; progress.innerText=(i+1)+" / "+slideWords.length;
      document.getElementById("slideEnglish").innerText = w.english; document.getElementById("slideMeaning").innerText = w.meaning;
      speak(w.english, 1.15);
    }
    function stopSlide(){ clearInterval(timer); speechSynthesis.cancel(); stopBtn.style.display="none"; if(i<slideWords.length) { resumeBtn.style.display="inline-block"; } }
    function resumeSlide(){ resumeBtn.style.display="none"; stopBtn.style.display="inline-block"; runSlide(); }
    function restartSlide(){ restartBtn.style.display="none"; startSlide(); }

    // ===== 単語帳 =====
    function showCardMenu(){
      hideAll(); cardMenu.style.display="block";
      let html="", size=20;
      for(let i=0;i<words.length;i+=size){
        let start=i, end=Math.min(i+size,words.length);
        html+=`<button class="orange" onclick="startCardRange(${start},${end})">${start+1}-${end}</button><br>`;
      }
      document.getElementById("cardRangeButtons").innerHTML=html;
    }
    function startCardRange(start,end){ cardWords=words.slice(start,end); hideAll(); cardView.style.display="block"; cardIndex=0; updateCard(false); }
    function updateCard(shouldSpeak = false){
      let w = cardWords[cardIndex];
      document.getElementById("cardProgress").innerText = `${cardIndex+1} / ${cardWords.length}`;
      document.getElementById("cardEnglish").innerHTML = w.english + `<button class="icon-btn" onclick="speak('${w.english}')">🔊</button>`;
      document.getElementById("cardMeaning").innerText = w.meaning;
      document.getElementById("cardPrevBtn").disabled = (cardIndex === 0);
      document.getElementById("cardNextBtn").disabled = (cardIndex === cardWords.length - 1);
      if(shouldSpeak) { speak(w.english); }
    }
    function nextCard(){ if(cardIndex < cardWords.length - 1){ cardIndex++; updateCard(false); } }
    function prevCard(){ if(cardIndex > 0){ cardIndex--; updateCard(false); } }

    // ===== テスト =====
    function showTestMenu(){
      hideAll(); comboCount = 0; stopBGM(); document.getElementById("testMenu").style.display="block";
      let html="", size=20;
      for(let i=0;i<words.length;i+=size){
        let start=i, end=Math.min(i+size,words.length); let rangeKey = `${start}-${end}`;
        let lastScoreRange = localStorage.getItem(`lastScoreRange_${rangeKey}`) || "未受験";
        let highScoreRange = localStorage.getItem(`highScoreRange_${rangeKey}`) || "なし";
        let highScoreRaw = Number(localStorage.getItem(`highScoreRangeRaw確定_${rangeKey}`) || -1);
        let starPrefix = (highScoreRaw >= Math.ceil((end - start) * (passRate / 100)) && highScoreRaw !== -1) ? "⭐ " : "";
        html += `<button class="blue" style="width:340px;" onclick="startTestRange(${start},${end})">${start+1}-${end}<br><span style="font-size:12px; font-weight:normal;">前回：${lastScoreRange} | 最高：${starPrefix}${highScoreRange}</span></button><br>`;
      }
      document.getElementById("rangeButtons").innerHTML = html;
    }
    function startTestRange(start,end){
      currentStartIdx = start; currentEndIdx = end; testWords=words.slice(start,end); currentTestRangeKey = `${start}-${end}`; hideAll(); test.style.display="block"; startBGM("test"); 
      current=0; wrong=[]; resultMode = "test"; comboCount = 0;
      let rangeLastScore = localStorage.getItem(`lastScoreRange_${currentTestRangeKey}`) || "未受験";
      let rangeHighScore = localStorage.getItem(`highScoreRange_${currentTestRangeKey}`) || "なし";
      lastScoreDisplay.innerHTML = `前回：${rangeLastScore} ｜ 最高：${rangeHighScore}`;
      showQ();
    }
    function showQ(){
      let w=testWords[current]; selectedWord=w; t_progress.innerText = `${current+1} / ${testWords.length}`;
      question.innerHTML=w.english + `<button class="icon-btn" onclick="speak('${w.english}')">🔊</button>`;
      result.innerText=""; nextBtn.style.display="none";
      let options=[w.meaning];
      while(options.length<4){
        let r=words[Math.floor(Math.random()*words.length)].meaning;
        if(!options.includes(r)) options.push(r);
      }
      options.sort(()=>Math.random()-0.5); choices.innerHTML="";
      options.forEach(c=>choices.innerHTML+=`<button class="choice" onclick="check(this,'${c}')">${c}</button>`);
    }
    
    function check(btn, ans){
      let correct = selectedWord.meaning; let isCorrect = (ans === correct);
      document.querySelectorAll("#choices button").forEach(b => { b.disabled = true; if(b.innerText === correct) { b.classList.add("correct-choice"); } else if (b === btn && !isCorrect) { b.classList.add("wrong-choice"); } });
      
      updateCombo(isCorrect); 

      // 💡 正解・不正解のテキストと、常に正解の意味を表示
      if(isCorrect){ 
        result.innerHTML = `<span style='color:#4CAF50;'>⭕ 正解！</span><br><span style='font-size:18px; color:var(--text-color); font-weight:normal;'>意味: ${correct}</span>`; 
        triggerPopEffect(btn); 
      } else { 
        result.innerHTML = `<span style='color:#ff4d4d;'>❌ 不正解...</span><br><span style='font-size:20px; color:#ff9800;'>正解は：【${correct}】</span>`; 
        wrong.push(selectedWord); 
        let currentReturnList = JSON.parse(localStorage.getItem("returnList") || "[]"); 
        if(!currentReturnList.some(item => item.english === selectedWord.english)){ currentReturnList.push(selectedWord); localStorage.setItem("returnList", JSON.stringify(currentReturnList)); } 
      }
      
      let solvedCount = current + 1; let correctCount = solvedCount - wrong.length;
      localStorage.setItem(`lastScoreRange_${currentTestRangeKey}`, `${correctCount}/${solvedCount} (途中)`);
      nextBtn.style.display = "inline-block";
    }
    
    function nextQ(){
      current++;
      if(current < testWords.length){ showQ(); } 
      else {
        stopBGM();
        let score = testWords.length - wrong.length; let total = testWords.length; let isPass = score >= Math.ceil(total*(passRate/100));
        if(isPass){ if(!passedRanges.includes(currentTestRangeKey)) passedRanges.push(currentTestRangeKey); localStorage.setItem("passedRanges", JSON.stringify(passedRanges)); }
        localStorage.setItem("lastScore", score); localStorage.setItem("lastTotal", total);
        let passedLabel = isPass ? "⭐合格" : "未合格"; localStorage.setItem(`lastScoreRange_${currentTestRangeKey}`, `${score}/${total} (${passedLabel})`);
        let finalHighRaw = localStorage.getItem(`highScoreRangeRaw確定_${currentTestRangeKey}`) || -1;
        if (score > finalHighRaw) { localStorage.setItem(`highScoreRangeRaw確定_${currentTestRangeKey}`, score); localStorage.setItem(`highScoreRange_${currentTestRangeKey}`, `${score}/${total}`); }
        showGrandResult(isPass, score, total);
      }
    }

    function showGrandResult(isPass, score, total) {
      hideAll(); resultScreen.style.display = "flex"; closeResBtn.innerText = "🏠 範囲選択へ戻る";
      if(isPass) {
        resultScreen.className = "result-screen pass-bg"; resTitle.innerText = "⭐ 合格！ ⭐"; resSub.innerText = "おめでとう！素晴らしい仕上がりです！"; resScore.innerText = `${score} / ${total} 点`; retryBtn.style.display = "none";
        triggerScreenBurst(); 
      } else {
        resultScreen.className = "result-screen fail-bg"; resTitle.innerText = "不合格"; resSub.innerText = "残念！もう一度挑戦しよう！"; resScore.innerText = `${score} / ${total} 点`; retryBtn.style.display = "inline-block"; retryBtn.onclick = function() { resultScreen.style.display = "none"; startTestRange(currentStartIdx, currentEndIdx); };
      }
    }

    function showReturnClearResult() {
      hideAll(); resultScreen.style.display = "flex"; resultScreen.className = "result-screen return-clear-bg"; resTitle.innerText = "🏆 リターン全制覇！ 🏆"; resSub.innerText = "すべての苦手を見事に克服しました！完璧です！"; resScore.innerText = "残り問題：0 問"; retryBtn.style.display = "none"; closeResBtn.innerText = "🏠 ホームへ戻る";
      triggerScreenBurst(); 
    }

    function closeResultScreen() { resultScreen.style.display = "none"; if(resultMode === "return") { goHome(); } else { backToTestMenu(); } }

    // ===== リターン学習 =====
    function goReturn(){
      hideAll(); wrong = JSON.parse(localStorage.getItem("returnList")||"[]");
      if(wrong.length===0){ returnEmpty.style.display="block"; return; }
      resultMode = "return"; returnDiv.style.display="block"; startBGM("return"); rIndex=0; comboCount = 0; showR();
    }
    function showR(){
      let w=wrong[rIndex]; r_progress.innerText=(rIndex+1)+" / "+wrong.length;
      r_question.innerHTML=w.english + `<button class="icon-btn" onclick="speak('${w.english}')">🔊</button>`;
      r_result.innerText=""; r_nextBtn.style.display="none";
      let options=[w.meaning];
      while(options.length<4){
        let r=words[Math.floor(Math.random()*words.length)].meaning;
        if(!options.includes(r)) options.push(r);
      }
      options.sort(()=>Math.random()-0.5); r_choices.innerHTML=""; options.forEach(c=>r_choices.innerHTML+=`<button class="choice" onclick="checkR(this,'${c}')">${c}</button>`);
    }
    
    let isCorrectThisTurn = false;
    function checkR(btn,ans){
      let currentWord = wrong[rIndex]; let correct=currentWord.meaning; let isCorrect = (ans === correct);
      document.querySelectorAll("#r_choices button").forEach(b=>{ b.disabled=true; if(b.innerText === correct) { b.classList.add("correct-choice"); } else if (b === btn && !isCorrect) { b.classList.add("wrong-choice"); } });
      
      updateCombo(isCorrect); 

      // 💡 リターン側でも正解の日本語を常に明示
      if(isCorrect){ 
        r_result.innerHTML=`<span style='color:#4CAF50;'>⭕ 正解！</span><br><span style='font-size:18px; color:var(--text-color); font-weight:normal;'>意味: ${correct}</span>`; 
        triggerPopEffect(btn); isCorrectThisTurn = true;
        wrong.splice(rIndex, 1); localStorage.setItem("returnList", JSON.stringify(wrong));
      } else { 
        r_result.innerHTML=`<span style='color:#ff4d4d;'>❌ 不正解...</span><br><span style='font-size:20px; color:#ff9800;'>正解は：【${correct}】</span>`; 
        isCorrectThisTurn = false;
      }
      r_nextBtn.style.display="inline-block";
    }
    
    function nextR(){ 
      if(!isCorrectThisTurn) { rIndex++; }
      if(wrong.length === 0) { stopBGM(); showReturnClearResult(); } 
      else if(rIndex >= wrong.length){ 
        stopBGM(); alert(`リターン学習を1周しました！\n（残り ${wrong.length} 問あります。もう一度挑戦して完璧にしましょう！）`); goHome(); 
      } else { showR(); }
    }

    // ===== データリセット =====
    function resetDataPrompt(){
      let pw=prompt("パスワードを入力してください:");
      if(pw==="sakura2026"){ if(confirm("本当に全てのデータをリセットしますか？")){ localStorage.clear(); passedRanges=[]; alert("データをリセットしました！"); showScore(); } } 
      else { alert("パスワードが違います！"); }
    }

    // 起動時処理
    showScore(); refreshCheerMessage(); 
  </script>
</body>
</html>
